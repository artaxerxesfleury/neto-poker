name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-test:
    name: API — unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: poker-online-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: poker-online-api/package-lock.json
      - run: npm ci
      - run: npm test

  web-build:
    name: Web — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: poker-online-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: poker-online-web/package-lock.json
      - run: npm ci
      - run: npm run build
